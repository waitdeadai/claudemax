name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opt into Node.js 24 for all JavaScript actions in this workflow.
# Silences the "Node.js 20 actions are deprecated" warning that GitHub will
# turn into the new default on 2026-06-02. actions/checkout@v4,
# actions/setup-node@v4, and pnpm/action-setup@v4 still ship as Node-20
# bundles but run cleanly on Node 24 today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: build · test · smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm build

      - name: pnpm test (unit)
        run: pnpm test

      - name: smoke (CLI surface)
        env:
          CMAX_SKIP_CLI_PROBE: '1'
        run: bash scripts/smoke.sh

  shellcheck:
    name: shellcheck hooks + scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: run shellcheck on hooks + scripts
        run: |
          shellcheck -x .claude/hooks/cmax-*.sh scripts/*.sh setup.sh || true
          # advisory only for now; flip to `shellcheck -e SC2086 -e SC1091` and drop `|| true` when stable

  typecheck:
    name: typecheck (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
